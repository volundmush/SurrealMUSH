# Nginx Config for SurrealMUSH

server {
    listen 8443 ssl;
    http2 on;
    #server_name localhost;

    ssl_certificate /etc/nginx/certs/surrealmush.crt;
    ssl_certificate_key /etc/nginx/certs/surrealmush.key;

    location ~ ^/(status|health|version|signup|signin|api) {
        proxy_pass http://localhost:8442;
        #proxy_ssl_certificate /etc/nginx/certs/surrealmush.crt;
        #proxy_ssl_certificate_key /etc/nginx/certs/surrealmush.key;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #proxy_http_version 1.1;
    }

    location ~ ^/(api|import|export|sql|key|graphql|ml) {
        allow ::1;
        allow 10.0.0.0/16;
        deny all;
        proxy_pass http://localhost:8442;
        #proxy_ssl_certificate /etc/nginx/certs/surrealmush.crt;
        #proxy_ssl_certificate_key /etc/nginx/certs/surrealmush.key;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #proxy_http_version 1.1;
    }

    location /rpc {
        allow ::1;
        allow 10.0.0.0/16;
        deny all;
        proxy_pass http://localhost:8442;
        #proxy_ssl_certificate /etc/nginx/certs/surrealmush.crt;
        #proxy_ssl_certificate_key /etc/nginx/certs/surrealmush.key;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /static/ {
        alias /static/;
        try_files $uri =404;
    }
}
